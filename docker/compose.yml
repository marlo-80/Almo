# =============================================================================
#  Docker Compose Configuration – Flight Delay Prediction Platform
# =============================================================================
#
#  This Compose file orchestrates the entire ML engineering pipeline for
#  flight delay prediction. It defines and connects all core services:
#
#    ┌─────────────────────────────────────────────────────────────────────┐
#    │  API (FastAPI)      → Serves predictions, exposes metrics          │
#    │  PostgreSQL         → Central data store (raw data + metadata)     │
#    │  MLflow             → Experiment tracking & model registry         │
#    │  Prefect            → Workflow orchestration (training & drift)    │
#    │  Prometheus         → Metrics collection & storage                 │
#    │  Grafana            → Dashboards & monitoring visualization        │
#    │  Simulator          → (optional) Generates live API traffic        │
#    │  Bootstrap          → One‑time data import & initialization        │
#    └─────────────────────────────────────────────────────────────────────┘
#
#  All services communicate over the `mle_network` bridge network.
#  Persistent data is stored in named Docker volumes.
#
#  --------------------------------------------------------------------------
#  Quick Start
#  --------------------------------------------------------------------------
#
#  1. Start all services (without simulator):
#       docker compose -f docker/compose.yml up -d
#
#  2. Run data import (one‑time, with bootstrap):
#       docker compose -f docker/compose.yml --profile init up bootstrap
#
#  3. Run the traffic simulator (optional, requires trained models):
#       docker compose -f docker/compose.yml --profile manual up simulator
#
#  4. View logs:
#       docker compose -f docker/compose.yml logs -f
#
#  --------------------------------------------------------------------------
#  Services Overview
#  --------------------------------------------------------------------------
#
#  Service          Port (Host)  Description
#  --------------  ------------  --------------------------------------------
#  api              8000         FastAPI prediction service
#  grafana          3000         Monitoring dashboards (login: admin/admin)
#  mlflow           5001         Experiment tracking UI
#  prefect          4200         Workflow orchestration UI
#  prometheus       9090         Metrics scraping UI
#  postgres         5432         PostgreSQL database (fastapi_db, mlflow, prefect)
#  simulator        (none)       Optional traffic generator (profile: manual)
#  bootstrap        (none)       One‑time data import (profile: init)
#
#  --------------------------------------------------------------------------
#  Volumes
#  --------------------------------------------------------------------------
#
#  Volume           Purpose
#  ---------------- --------------------------------------------------------
#  postgres_data    Database storage (persistent across restarts)
#  grafana_data     Grafana configuration (dashboards, data sources, etc.)
#
#  --------------------------------------------------------------------------
#  Profiles
#  --------------------------------------------------------------------------
#
#  Profile   Services          Purpose
#  --------  ----------------  ---------------------------------------------
#  (default) api, grafana,      Main stack for production‑like operation
#            mlflow, prefect,
#            prometheus, postgres
#  init      bootstrap         One‑time data import (run once after first start)
#  manual    simulator         Manual traffic simulation (requires trained models)
#
#  --------------------------------------------------------------------------
#  Environment Variables
#  --------------------------------------------------------------------------
#
#  The following environment variables are used across services:
#
#  Variable               Default     Purpose
#  ---------------------  ----------  ----------------------------------------
#  POSTGRES_USER          testuser    PostgreSQL username
#  POSTGRES_PASSWORD      testuser    PostgreSQL password
#  MODEL_NAME             test_name   Default model name (API)
#  MODEL_ALIAS            champion    Default model alias (API)
#
#  These can be overridden via a `.env` file in the project root.
#
#  --------------------------------------------------------------------------
#  Notes
#  --------------------------------------------------------------------------
#  - The API container is built from `docker/dockerfiles/dockerfile_fastAPI`.
#  - The bootstrap container uses the same image and runs a one‑time script.
#  - PostgreSQL is configured with performance optimizations for bulk import
#    (shared_buffers, synchronous_commit=off, etc.).
#  - Grafana is pre‑provisioned with dashboards and data sources from
#    `./monitoring/grafana/provisioning/`.
#  - Prometheus scrapes the API every 1 second (configured in
#    `./monitoring/prometheus.yml`).
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # API – FastAPI with Uvicorn, single HTTP-entrypoint for all services
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/dockerfiles/dockerfile_fastAPI
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DB_URI: postgresql://${POSTGRES_USER:-testuser}:${POSTGRES_PASSWORD:-testuser}@postgres:5432/fastapi_db
      PREFECT_API_URL: http://prefect:4200/api
      MODEL_NAME: test_name           # ← neu
      MODEL_ALIAS: champion           # ← neu
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ../:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mle_network
    restart: unless-stopped       

  # ---------------------------------------------------------------------------
  # Grafana – Dashboards for Prometheus
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.0.1          # 13.0.1 existiert nicht
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_PROVISIONING_ALLOW_OVERRIDE=true
      # IMPORTANT: Double dash between DASHBOARDS and MIN_REFRESH_INTERVAL
      - GF_DASHBOARDS__MIN_REFRESH_INTERVAL=1s
      - GF_LIVE_ALLOWED_ORIGINS=*
 
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s  
    networks:
      - mle_network
    restart: unless-stopped


  # ---------------------------------------------------------------------------
  # MLflow – Model Server
  # ---------------------------------------------------------------------------
  mlflow:
    image: python:3.11-slim
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - /bin/sh
      - -lc
      - |
        pip install --no-cache-dir mlflow==3.11.1 psycopg2-binary==2.9.11 && \
        mkdir -p /app/storage/mlartifacts && \
        mlflow server \
          --host 0.0.0.0 \
          --port 5000 \
          --backend-store-uri postgresql://${POSTGRES_USER:-testuser}:${POSTGRES_PASSWORD:-testuser}@postgres:5432/mlflow \
          --serve-artifacts \
          --artifacts-destination /app/storage/mlartifacts \
          --allowed-hosts '*'
    ports:
      - "5001:5000"
    volumes:
      - ../:/app          # ← unverändert laut Vorgabe
    networks:
      - mle_network
    restart: unless-stopped 

  # ---------------------------------------------------------------------------
  # Prefect
  # ---------------------------------------------------------------------------
  prefect:
    image: prefecthq/prefect:3.6.25-python3.11
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER:-testuser}:${POSTGRES_PASSWORD:-testuser}@postgres:5432/prefect
    command:
      - /bin/sh
      - -lc
      - |
        pip install --no-cache-dir asyncpg==0.31.0 && \
        prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    networks:
      - mle_network
    restart: unless-stopped       

  # ---------------------------------------------------------------------------
  # Prometheus – Metrik-Sammler
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.7.3
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - api
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - mle_network
    restart: unless-stopped 


  # ---------------------------------------------------------------------------
  # PostgreSQL – will create several databases on init
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-testuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testuser}
    command: >
      postgres
      -c shared_buffers=2GB
      -c synchronous_commit=off
      -c max_wal_size=4GB
      -c checkpoint_timeout=15min
      -c work_mem=64MB
      -c maintenance_work_mem=1GB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-testuser} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mle_network
    restart: unless-stopped

     
    

# ---------------------------------------------------------------------------
# Traffic Simulator
# ---------------------------------------------------------------------------
  simulator:
    image: docker-api
    working_dir: /app
    depends_on:
      - api
    networks:
      - mle_network
    volumes:
      - ./simulator/simulate_traffic.py:/app/simulate_traffic.py:ro
    command: python /app/simulate_traffic.py
    environment:
      API_URL: http://api:8000/predict
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DB_SOURCE_TABLE: 'dbt_staging."intra_covid_1M"'
      SLEEP_SEC: 2
      MODEL_NAME: ${MODEL_NAME:-}
      MODEL_ALIAS: ${MODEL_ALIAS:-}
    profiles:
      - manual
    restart: unless-stopped        


  # ---------------------------------------------------------------------------
  # Bootstrapping for Postgres
  # ---------------------------------------------------------------------------
  bootstrap:
    image: docker-api
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mle_network
    volumes:
      - ../:/app   
    command: python docker/scripts/bootstrap_db.py
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-testuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testuser}
    profiles:
      - init


     




# ---------------------------------------------------------------------------
# Infrastructure
# ---------------------------------------------------------------------------
networks:
  mle_network:
    driver: bridge

volumes:
  postgres_data:
  grafana_data:
  





